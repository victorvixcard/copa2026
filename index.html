<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Viewport: garante zoom desativado e suporte a notch (iPhone X+) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Cor da barra de status (Android Chrome, Safari iOS) -->
    <meta name="theme-color" content="#0a0f1e" />

    <!-- Suporte PWA / WebApp em iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Meu Álbum 2026" />

    <!-- Suporte WebView Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO básico -->
    <meta name="description" content="Controle suas figurinhas da Copa do Mundo 2026 de forma simples e rápida." />

    <title>Meu Álbum 2026 — Copa do Mundo</title>

    <style>
      /* Reset cross-platform e suporte a safe-area (notch iOS) */
      html, body {
        height: 100%;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        margin: 0;
        background: #0a0f1e;
        /* Padding para áreas seguras (notch, dynamic island, etc) */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* Suaviza o scroll em iOS */
      html { scroll-behavior: smooth; }
      /* Evita zoom acidental ao tocar duplo em iOS */
      * { touch-action: manipulation; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
